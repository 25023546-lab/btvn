name: Java CI with Maven

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # Dùng clean package để xóa rác cũ và đóng gói mới
        run: mvn clean package --file LeCongVinh_25023546_Week9/Bai03/pom.xml

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: My-BankSystem-Jar
          path: LeCongVinh_25023546_Week9/Bai03/target/*.jar