name: Java CI with Maven

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (Test and Package)
        run: mvn clean package -DskipTests -Dcheckstyle.skip --file LeCongVinh_25023546_Week9/Bai03/pom.xml

      - name: Upload Build Artifact (.jar)
        uses: actions/upload-artifact@v3
        with:
          name: BankSystem-Artifact
          path: LeCongVinh_25023546_Week9/Bai03/target/
